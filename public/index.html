<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrapes — URL to Tutorial Images</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --muted: #888;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(59, 130, 246, 0.08), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 92, 246, 0.06), transparent 50%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(59, 130, 246, 0.03), transparent 40%);
      background-attachment: fixed;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    @media (min-width: 1024px) {
      .container { max-width: 960px; min-height: 85vh; }
      .input-group { padding: 2.5rem; }
      .url-row { margin-bottom: 1.75rem; }
      .prompt-row { margin-top: 1.5rem; }
      .platform-grid { gap: 0.75rem; }
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .input-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .url-row {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
      margin-bottom: 1.25rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: #555; }

    .input-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      width: fit-content;
    }

    .input-toggle button {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 0.5rem 1.25rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .input-toggle button.active {
      background: var(--accent);
      color: white;
    }

    .input-toggle button:not(.active):hover { background: rgba(255,255,255,0.05); }

    .image-upload-area {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }

    .image-upload-area.visible { display: flex; }
    .image-upload-area:hover { border-color: var(--accent); }
    .image-upload-area.dragover { border-color: var(--accent); background: rgba(59,130,246,0.05); }

    .image-upload-area .upload-text {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .image-upload-area .upload-text strong { color: var(--accent); }

    .image-upload-preview {
      display: none;
      align-items: center;
      gap: 0.75rem;
    }

    .image-upload-preview.visible { display: flex; }

    .image-upload-preview img {
      height: 80px;
      max-width: 200px;
      object-fit: contain;
      border-radius: 8px;
    }

    .image-upload-preview .upload-name {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .image-upload-preview .upload-remove {
      background: none;
      border: none;
      color: var(--error);
      font-size: 1rem;
      cursor: pointer;
    }

    button.generate {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.875rem 1.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button.generate:hover { background: var(--accent-hover); }
    button.generate:active { transform: scale(0.98); }
    button.generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .platforms-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .platform-grid { display: grid; grid-template-columns: repeat(3, 150px); column-gap: 40px; row-gap: 0.75rem; justify-content: center; }

    .platform-chip { position: relative; overflow: hidden; border-radius: 10px; }
    .platform-chip input { position: absolute; opacity: 0; width: 0; height: 0; }

    .platform-chip label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      width: 150px;
      height: 150px;
      font-size: 1rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
      position: relative;
      overflow: hidden;
      text-align: center;
      line-height: 1.2;
    }

    .platform-chip label::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle 80px at var(--mouse-x, -100px) var(--mouse-y, -100px),
        rgba(255, 255, 255, 0.12), transparent 70%);
      pointer-events: none;
      transition: opacity 0.2s;
      opacity: 0;
    }

    .platform-chip label:hover::before { opacity: 1; }

    .platform-chip label:hover {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .platform-chip label .plat-icon { display: none; }
    .platform-chip label .plat-name { font-size: 1rem; font-weight: 600; }
    .platform-chip label .dims { font-size: 0.75rem; opacity: 0.5; margin-top: 0.15rem; }

    .platform-chip input:checked + label {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.4);
      color: var(--text);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.1), inset 0 0 0 1px rgba(59, 130, 246, 0.1);
    }

    .platform-chip input:checked + label::before {
      background: radial-gradient(circle 80px at var(--mouse-x, -100px) var(--mouse-y, -100px),
        rgba(59, 130, 246, 0.2), transparent 70%);
    }

    .prompt-row {
      margin-top: 1rem;
    }

    .prompt-row textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 2.5rem;
      max-height: 8rem;
      transition: border-color 0.2s;
    }

    .prompt-row textarea:focus { border-color: var(--accent); }
    .prompt-row textarea::placeholder { color: #555; }

    .logo-row {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: space-between;
    }

    .logo-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-left: auto;
    }

    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      border-color: var(--error);
      color: var(--error);
      background: rgba(239, 68, 68, 0.08);
    }

    .logo-upload-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .logo-upload-btn:hover { background: var(--accent-hover); }
    .logo-upload-btn:active { transform: scale(0.98); }

    .logo-preview {
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-preview.visible { display: flex; }

    .logo-preview img {
      height: 60px;
      max-width: 160px;
      object-fit: contain;
      border-radius: 6px;
    }

    .logo-preview .logo-name {
      font-size: 0.75rem;
      color: var(--muted);
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logo-remove {
      background: none;
      border: none;
      color: var(--error);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0 0.25rem;
      line-height: 1;
    }

    .logo-remove:hover { opacity: 0.7; }

    .status {
      margin-top: 1rem;
      display: none;
      align-items: center;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status.visible { display: flex; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .spinner-sm { width: 14px; height: 14px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 1rem;
      color: var(--error);
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .error-msg.visible { display: block; }

    .results { display: none; margin-top: 1rem; }
    .results.visible { display: block; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .results-meta { color: var(--muted); font-size: 0.85rem; }
    .results-meta strong { color: var(--text); }

    .cost-badge {
      display: inline-block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: var(--success);
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      margin-left: 0.5rem;
    }

    button.download-all {
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button.download-all:hover { opacity: 0.85; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .image-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--border);
    }

    .platform-name { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .ratio-label { font-size: 0.7rem; color: var(--muted); margin-left: 0.4rem; }

    .card-download {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .card-download:hover { background: rgba(59, 130, 246, 0.1); }

    .card-body img { width: 100%; height: auto; display: block; cursor: pointer; }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 2rem;
      cursor: pointer;
    }

    .lightbox.visible { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      cursor: default;
    }

    .lightbox-inner img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      display: block;
    }

    .lightbox-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
    }

    .lightbox-label {
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .lightbox-label span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.8rem;
      margin-left: 0.5rem;
    }

    .lightbox-download {
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .lightbox-download:hover { opacity: 0.85; }

    .lightbox-close {
      position: absolute;
      top: -2.5rem;
      right: 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      line-height: 1;
    }

    .lightbox-close:hover { color: var(--text); }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
      z-index: 1001;
    }

    .lightbox-nav:hover { background: rgba(255, 255, 255, 0.25); }
    .lightbox-nav.prev { left: 1.5rem; }
    .lightbox-nav.next { right: 1.5rem; }

    .lightbox-counter {
      color: var(--muted);
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }

    .card-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.85rem;
      gap: 0.5rem;
    }

    .card-error {
      padding: 1.5rem;
      color: var(--error);
      font-size: 0.8rem;
      text-align: center;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .url-row { flex-direction: column; }
      h1 { font-size: 1.75rem; }
      .image-grid { grid-template-columns: 1fr; }
      .platform-grid { grid-template-columns: repeat(3, 1fr); column-gap: 10px; }
      .platform-chip label {
        width: 100%;
        height: 70px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>Scrapes</span></h1>
      <p class="subtitle">Paste a URL or upload an image. Get annotated tutorial images. No Canva needed.</p>
    </header>

    <div class="input-group">
      <div class="input-toggle" id="input-toggle">
        <button class="active" onclick="setInputMode('url')">URL</button>
        <button onclick="setInputMode('image')">Upload Image</button>
      </div>
      <div class="url-row" id="url-row">
        <input type="text" id="url-input" placeholder="example.com" autofocus />
        <button class="generate" id="generate-btn" onclick="generate()">Generate</button>
      </div>
      <div class="image-upload-area" id="image-upload-area" onclick="document.getElementById('source-image-file').click()">
        <input type="file" id="source-image-file" accept="image/*" hidden />
        <div class="upload-text"><strong>Click to upload</strong> or drag and drop</div>
        <div class="upload-text">PNG, JPG up to 10MB</div>
        <div class="image-upload-preview" id="image-upload-preview">
          <img id="image-upload-preview-img" alt="Preview" />
          <span class="upload-name" id="image-upload-name"></span>
          <button type="button" class="upload-remove" onclick="event.stopPropagation(); removeSourceImage()">&times;</button>
        </div>
      </div>
      <div id="image-generate-row" style="display:none;text-align:right;margin-bottom:1.25rem">
        <button class="generate" id="generate-btn-img" onclick="generate()">Generate</button>
      </div>
      <div class="platforms-label">Output Format</div>
      <div class="platform-grid" id="platform-grid"></div>
      <div class="prompt-row">
        <textarea id="prompt-input" rows="1" placeholder="Optional: &quot;Focus on the pricing section&quot; or &quot;Highlight the signup flow&quot;"></textarea>
      </div>
      <div class="logo-row">
        <button type="button" class="reset-btn" onclick="resetAll()" title="Reset">&#x21bb;</button>
        <div class="logo-right">
          <input type="file" id="logo-file" accept="image/*" hidden />
          <div class="logo-preview" id="logo-preview">
            <img id="logo-preview-img" alt="Logo" />
            <span class="logo-name" id="logo-name"></span>
            <button type="button" class="logo-remove" onclick="removeLogo()">&times;</button>
          </div>
          <button type="button" class="logo-upload-btn" onclick="document.getElementById('logo-file').click()">Upload Logo</button>
        </div>
      </div>
      <div class="status" id="status">
        <div class="spinner"></div>
        <span id="status-text">Capturing screenshot...</span>
      </div>
    </div>

    <div class="error-msg" id="error"></div>

    <div class="results" id="results">
      <div class="results-header">
        <div class="results-meta">
          <strong id="results-title"></strong>
          <br/>
          <span id="results-info"></span>
          <span class="cost-badge" id="cost-badge"></span>
        </div>
        <button class="download-all" onclick="downloadAll()">Download All</button>
      </div>
      <div class="image-grid" id="image-grid"></div>
    </div>

    <div class="lightbox" id="lightbox">
      <button class="lightbox-nav prev" id="lightbox-prev">&#8249;</button>
      <button class="lightbox-nav next" id="lightbox-next">&#8250;</button>
      <div class="lightbox-inner">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <img id="lightbox-img" alt="Preview" />
        <div class="lightbox-bar">
          <div class="lightbox-label" id="lightbox-label"><span class="lightbox-counter" id="lightbox-counter"></span></div>
          <button class="lightbox-download" id="lightbox-download">Download PNG</button>
        </div>
      </div>
    </div>

    <footer>
      Built with <a href="https://n8n.io">n8n</a>, <a href="https://anthropic.com">Claude Vision</a>, and <a href="https://www.hostinger.com">Hostinger</a>
      &mdash; <a href="https://github.com/txmyer-dev/scrapes">Source</a>
      <br/><br/>
      Scrapes.ai x Hostinger Hackathon 2026
    </footer>
  </div>

  <script>
    const PLATFORMS = [
      { id: 'portrait',   name: 'Portrait',   ratio: '3:4',   w: 1080, h: 1440 },
      { id: 'social',     name: 'Social',      ratio: '4:5',   w: 1080, h: 1350 },
      { id: 'story',      name: 'Story',       ratio: '9:16',  w: 1080, h: 1920 },
    ];

    const DEFAULT_SELECTED = ['portrait', 'social', 'story'];

    const ICONS = {};

    // Build platform chips using safe DOM methods
    const platformGrid = document.getElementById('platform-grid');
    PLATFORMS.forEach(function(p) {
      var chip = document.createElement('div');
      chip.className = 'platform-chip';

      var input = document.createElement('input');
      input.type = 'checkbox';
      input.id = 'plat-' + p.id;
      input.value = p.id;
      if (DEFAULT_SELECTED.indexOf(p.id) !== -1) input.checked = true;

      var label = document.createElement('label');
      label.setAttribute('for', 'plat-' + p.id);

      var nameSpan = document.createElement('span');
      nameSpan.className = 'plat-name';
      nameSpan.textContent = p.name;
      label.appendChild(nameSpan);

      var dims = document.createElement('span');
      dims.className = 'dims';
      dims.textContent = p.ratio + ' \u00B7 ' + p.w + '\u00D7' + p.h;
      label.appendChild(dims);

      chip.appendChild(input);
      chip.appendChild(label);
      platformGrid.appendChild(chip);
    });

    // Glassmorphism mouse tracking
    document.querySelectorAll('.platform-chip label').forEach(function(label) {
      label.addEventListener('mousemove', function(e) {
        var rect = label.getBoundingClientRect();
        label.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
        label.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
      });
    });

    var urlInput = document.getElementById('url-input');
    var promptInput = document.getElementById('prompt-input');
    var generateBtn = document.getElementById('generate-btn');
    var statusEl = document.getElementById('status');
    var statusText = document.getElementById('status-text');
    var errorEl = document.getElementById('error');
    var resultsEl = document.getElementById('results');
    var imageGrid = document.getElementById('image-grid');
    var resultsTitle = document.getElementById('results-title');
    var resultsInfo = document.getElementById('results-info');
    var costBadge = document.getElementById('cost-badge');

    var generatedImages = [];
    var logoBase64 = '';
    var sourceImageBase64 = '';
    var inputMode = 'url';

    // Input mode toggle
    function setInputMode(mode) {
      inputMode = mode;
      var btns = document.querySelectorAll('#input-toggle button');
      btns[0].className = mode === 'url' ? 'active' : '';
      btns[1].className = mode === 'image' ? 'active' : '';
      document.getElementById('url-row').style.display = mode === 'url' ? '' : 'none';
      document.getElementById('image-upload-area').classList.toggle('visible', mode === 'image');
      document.getElementById('image-generate-row').style.display = mode === 'image' ? '' : 'none';
    }

    // Source image upload
    var uploadArea = document.getElementById('image-upload-area');
    document.getElementById('source-image-file').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (file) handleSourceImage(file);
    });

    uploadArea.addEventListener('dragover', function(e) {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', function() {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', function(e) {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      var file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleSourceImage(file);
    });

    function handleSourceImage(file) {
      if (file.size > 10 * 1024 * 1024) {
        errorEl.textContent = 'Image must be under 10MB.';
        errorEl.classList.add('visible');
        return;
      }
      var reader = new FileReader();
      reader.onload = function(ev) {
        sourceImageBase64 = ev.target.result;
        document.getElementById('image-upload-preview-img').src = sourceImageBase64;
        document.getElementById('image-upload-name').textContent = file.name;
        document.getElementById('image-upload-preview').classList.add('visible');
      };
      reader.readAsDataURL(file);
    }

    function removeSourceImage() {
      sourceImageBase64 = '';
      document.getElementById('source-image-file').value = '';
      document.getElementById('image-upload-preview').classList.remove('visible');
    }

    // Logo upload handling
    document.getElementById('logo-file').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        errorEl.textContent = 'Logo must be under 2MB.';
        errorEl.classList.add('visible');
        return;
      }
      var reader = new FileReader();
      reader.onload = function(ev) {
        logoBase64 = ev.target.result;
        document.getElementById('logo-preview-img').src = logoBase64;
        document.getElementById('logo-name').textContent = file.name;
        document.getElementById('logo-preview').classList.add('visible');
      };
      reader.readAsDataURL(file);
    });

    function removeLogo() {
      logoBase64 = '';
      document.getElementById('logo-file').value = '';
      document.getElementById('logo-preview').classList.remove('visible');
    }

    var statusMessages = [
      'Capturing screenshot...',
      'Extracting page metadata...',
      'Claude is analyzing the page...',
      'Generating annotation plan...',
      'Rendering all formats...',
      'Almost there...',
    ];

    urlInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') generate();
    });

    function getSelectedPlatforms() {
      return PLATFORMS.filter(function(p) {
        return document.getElementById('plat-' + p.id).checked;
      });
    }

    function buildCardElement(p, state) {
      var card = document.createElement('div');
      card.className = 'image-card';
      card.id = 'card-' + p.id;

      var header = document.createElement('div');
      header.className = 'card-header';

      var info = document.createElement('div');
      var nameSpan = document.createElement('span');
      nameSpan.className = 'platform-name';
      nameSpan.textContent = p.name;
      var ratioSpan = document.createElement('span');
      ratioSpan.className = 'ratio-label';
      ratioSpan.textContent = p.ratio + ' \u00B7 ' + p.w + 'x' + p.h;
      info.appendChild(nameSpan);
      info.appendChild(ratioSpan);

      var dlBtn = document.createElement('button');
      dlBtn.className = 'card-download';
      dlBtn.textContent = 'Download';
      dlBtn.style.display = state === 'loaded' ? '' : 'none';
      dlBtn.addEventListener('click', function() { downloadOne(p.id); });

      header.appendChild(info);
      header.appendChild(dlBtn);
      card.appendChild(header);

      var body = document.createElement('div');
      body.className = 'card-body';

      if (state === 'loading') {
        var loading = document.createElement('div');
        loading.className = 'card-loading';
        var spinner = document.createElement('div');
        spinner.className = 'spinner spinner-sm';
        loading.appendChild(spinner);
        loading.appendChild(document.createTextNode(' Generating...'));
        body.appendChild(loading);
      }

      card.appendChild(body);
      return card;
    }

    function setCardLoaded(platformId, imageSrc) {
      var card = document.getElementById('card-' + platformId);
      if (!card) return;
      var body = card.querySelector('.card-body');
      body.textContent = '';
      var img = document.createElement('img');
      img.src = imageSrc;
      img.alt = platformId + ' scrapes image';
      img.addEventListener('click', function() { openLightbox(platformId); });
      body.appendChild(img);
      var dlBtn = card.querySelector('.card-download');
      if (dlBtn) dlBtn.style.display = '';
    }

    function setCardError(platformId, message) {
      var card = document.getElementById('card-' + platformId);
      if (!card) return;
      var body = card.querySelector('.card-body');
      body.textContent = '';
      var errDiv = document.createElement('div');
      errDiv.className = 'card-error';
      errDiv.textContent = message;
      body.appendChild(errDiv);
    }

    async function generate() {
      var url = '';
      var sourceImage = '';

      if (inputMode === 'url') {
        url = urlInput.value.trim();
        if (!url) { urlInput.focus(); return; }
        if (!/^https?:\/\//i.test(url)) {
          url = 'https://' + url.replace(/^\/\//, '');
        }
        urlInput.value = url;
      } else {
        sourceImage = sourceImageBase64;
        if (!sourceImage) {
          errorEl.textContent = 'Upload an image first.';
          errorEl.classList.add('visible');
          return;
        }
      }

      var selected = getSelectedPlatforms();
      if (selected.length === 0) {
        errorEl.textContent = 'Select at least one platform.';
        errorEl.classList.add('visible');
        return;
      }

      // Reset UI
      errorEl.classList.remove('visible');
      resultsEl.classList.remove('visible');
      statusEl.classList.add('visible');
      generateBtn.disabled = true;
      var genBtnImg = document.getElementById('generate-btn-img');
      if (genBtnImg) genBtnImg.disabled = true;
      imageGrid.textContent = '';
      generatedImages = [];

      // Cycle status messages
      var msgIndex = 0;
      var msgs = inputMode === 'image'
        ? ['Claude is analyzing the image...', 'Generating annotation plan...', 'Rendering all formats...', 'Almost there...']
        : statusMessages;
      statusText.textContent = msgs[0];
      var statusInterval = setInterval(function() {
        msgIndex = Math.min(msgIndex + 1, msgs.length - 1);
        statusText.textContent = msgs[msgIndex];
      }, 5000);

      // Create placeholder cards
      selected.forEach(function(p) {
        imageGrid.appendChild(buildCardElement(p, 'loading'));
      });

      resultsEl.classList.add('visible');
      resultsTitle.textContent = 'Generating...';
      var label = inputMode === 'url' ? url : 'uploaded image';
      resultsInfo.textContent = label + ' \u2014 ' + selected.length + ' format' + (selected.length > 1 ? 's' : '');
      costBadge.textContent = '~$0.03 est.';

      var startTime = Date.now();
      var userPrompt = promptInput.value.trim();

      // Deduplicate ratios
      var ratioMap = {};
      selected.forEach(function(p) {
        if (!ratioMap[p.ratio]) ratioMap[p.ratio] = [];
        ratioMap[p.ratio].push(p);
      });
      var uniqueFormats = Object.keys(ratioMap);

      var payload = { formats: uniqueFormats, prompt: userPrompt, logo: logoBase64 || undefined };
      if (inputMode === 'url') {
        payload.url = url;
      } else {
        payload.image = sourceImage;
      }

      try {
        var res = await fetch('/api/annotate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        clearInterval(statusInterval);

        if (!res.ok) {
          var errData = await res.json();
          throw new Error(errData.error || 'Request failed');
        }

        var data = await res.json();

        if (data.images) {
          // Map images back to platforms (multiple platforms can share a ratio)
          selected.forEach(function(p) {
            var img = data.images[p.ratio];
            if (img) {
              generatedImages.push({ id: p.id, name: p.name, ratio: p.ratio, image: img });
              setCardLoaded(p.id, img);
            } else {
              setCardError(p.id, 'No image for this format');
            }
          });
        } else {
          throw new Error('No images returned');
        }

        var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        resultsTitle.textContent = generatedImages.length + '/' + selected.length + ' images generated';
        resultsInfo.textContent = label + ' \u2014 ' + elapsed + 's \u2014 ' + uniqueFormats.length + ' unique ratio' + (uniqueFormats.length > 1 ? 's' : '') + ' rendered';
        costBadge.textContent = '~$0.03';
      } catch (err) {
        clearInterval(statusInterval);
        selected.forEach(function(p) { setCardError(p.id, err.message); });
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
      } finally {
        statusEl.classList.remove('visible');
        generateBtn.disabled = false;
        var genBtnImg2 = document.getElementById('generate-btn-img');
        if (genBtnImg2) genBtnImg2.disabled = false;
      }
    }

    function downloadOne(platformId) {
      var img = generatedImages.find(function(i) { return i.id === platformId; });
      if (!img) return;
      var a = document.createElement('a');
      a.href = img.image;
      var domain = urlInput.value.replace(/https?:\/\//, '').replace(/[/\\?#]/g, '_').slice(0, 30);
      a.download = 'scrapes_' + domain + '_' + platformId + '.png';
      a.click();
    }

    function resetAll() {
      urlInput.value = '';
      promptInput.value = '';
      removeLogo();
      removeSourceImage();
      generatedImages = [];
      imageGrid.textContent = '';
      resultsEl.classList.remove('visible');
      errorEl.classList.remove('visible');
      statusEl.classList.remove('visible');
      generateBtn.disabled = false;
      setInputMode('url');
      urlInput.focus();
    }

    // Lightbox with gallery navigation
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var lightboxLabel = document.getElementById('lightbox-label');
    var lightboxCounter = document.getElementById('lightbox-counter');
    var lightboxDownload = document.getElementById('lightbox-download');
    var lightboxClose = document.getElementById('lightbox-close');
    var lightboxPrev = document.getElementById('lightbox-prev');
    var lightboxNext = document.getElementById('lightbox-next');
    var lightboxIndex = 0;

    function updateLightbox(index) {
      if (generatedImages.length === 0) return;
      lightboxIndex = index;
      var img = generatedImages[index];
      lightboxImg.src = img.image;

      var plat = PLATFORMS.find(function(p) { return p.id === img.id; });
      lightboxLabel.textContent = '';
      lightboxLabel.appendChild(document.createTextNode(img.name));
      if (plat) {
        var sp = document.createElement('span');
        sp.textContent = plat.ratio + ' \u00B7 ' + plat.w + 'x' + plat.h;
        lightboxLabel.appendChild(sp);
      }
      var counter = document.createElement('span');
      counter.className = 'lightbox-counter';
      counter.textContent = (index + 1) + ' / ' + generatedImages.length;
      lightboxLabel.appendChild(counter);

      lightboxPrev.style.display = generatedImages.length > 1 ? '' : 'none';
      lightboxNext.style.display = generatedImages.length > 1 ? '' : 'none';
    }

    function openLightbox(platformId) {
      var idx = generatedImages.findIndex(function(i) { return i.id === platformId; });
      if (idx === -1) return;
      updateLightbox(idx);
      lightbox.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function navigateLightbox(dir) {
      if (generatedImages.length < 2) return;
      var next = (lightboxIndex + dir + generatedImages.length) % generatedImages.length;
      updateLightbox(next);
    }

    function closeLightbox() {
      lightbox.classList.remove('visible');
      document.body.style.overflow = '';
      lightboxIndex = 0;
    }

    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', function(e) { e.stopPropagation(); navigateLightbox(-1); });
    lightboxNext.addEventListener('click', function(e) { e.stopPropagation(); navigateLightbox(1); });

    lightboxDownload.addEventListener('click', function() {
      if (generatedImages[lightboxIndex]) downloadOne(generatedImages[lightboxIndex].id);
    });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('visible')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') navigateLightbox(-1);
      else if (e.key === 'ArrowRight') navigateLightbox(1);
    });

    function downloadAll() {
      generatedImages.forEach(function(img) {
        var a = document.createElement('a');
        a.href = img.image;
        var domain = urlInput.value.replace(/https?:\/\//, '').replace(/[/\\?#]/g, '_').slice(0, 30);
        a.download = 'scrapes_' + domain + '_' + img.id + '.png';
        a.click();
      });
    }
  </script>
</body>
</html>
